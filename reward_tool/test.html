<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖工具单元测试 - 完整覆盖率测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-card.highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .coverage-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .coverage-title {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .coverage-bar-container {
            background: #e0e0e0;
            height: 40px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .coverage-bar {
            height: 100%;
            background: linear-gradient(90deg, #4caf50 0%, #8bc34a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: width 0.5s ease;
        }

        .coverage-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .coverage-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }

        .coverage-item.covered {
            border-left-color: #4caf50;
        }

        .coverage-item.uncovered {
            border-left-color: #f44336;
        }

        .coverage-func-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .coverage-func-status {
            font-size: 12px;
            color: #666;
        }

        .test-suite {
            margin-bottom: 30px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .suite-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suite-name {
            font-size: 18px;
            font-weight: bold;
        }

        .suite-stats {
            font-size: 14px;
        }

        .test-case {
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .test-case:hover {
            background: #f9f9f9;
        }

        .test-case:last-child {
            border-bottom: none;
        }

        .test-info {
            flex: 1;
        }

        .test-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
        }

        .test-desc {
            font-size: 13px;
            color: #666;
        }

        .test-status {
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            min-width: 80px;
            text-align: center;
        }

        .status-pass {
            background: #d4edda;
            color: #155724;
        }

        .status-fail {
            background: #f8d7da;
            color: #721c24;
        }

        .test-error {
            width: 100%;
            margin-top: 8px;
            padding: 8px 12px;
            background: #fff3cd;
            border-left: 3px solid #ffc107;
            border-radius: 4px;
            font-size: 12px;
            color: #856404;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 抽奖工具单元测试</h1>
        <p class="subtitle">完整功能测试 - 目标覆盖率 ≥ 95%</p>

        <div class="controls">
            <button class="btn btn-primary" id="runBtn" onclick="startTesting()">开始测试</button>
        </div>

        <div class="stats-grid" id="statsGrid" style="display: none;">
            <div class="stat-card highlight">
                <div class="stat-value" id="totalTests">0</div>
                <div class="stat-label">总测试数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="passedTests" style="color: #4caf50;">0</div>
                <div class="stat-label">通过</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="failedTests" style="color: #f44336;">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="passRate">0%</div>
                <div class="stat-label">通过率</div>
            </div>
        </div>

        <div class="coverage-section" id="coverageSection" style="display: none;">
            <div class="coverage-title">📊 代码覆盖率</div>
            <div class="coverage-bar-container">
                <div class="coverage-bar" id="coverageBar">0%</div>
            </div>
            <div class="coverage-details" id="coverageDetails"></div>
        </div>

        <div id="testResults"></div>
    </div>

    <!-- 加载被测试应用 -->
    <iframe id="appFrame" src="index.html" style="display: none;"></iframe>

    <script>
        // ==================== 测试框架 ====================
        class TestFramework {
            constructor() {
                this.tests = [];
                this.results = [];
                this.coverage = {};
                this.appDoc = null;
            }

            // 初始化 - 获取应用文档对象
            init(doc) {
                this.appDoc = doc;
                this.initCoverage();
            }

            // 初始化覆盖率跟踪
            initCoverage() {
                const functions = [
                    'addPrize', 'removePrize', 'getPrizes', 'updatePrizeSelect',
                    'togglePrizeSettings', 'startDraw', 'getAvailableNumbers',
                    'getValidRange', 'parseExcludeNumbers', 'toggleWinner',
                    'renderWinnerList', 'updateStats', 'resetAll',
                    'updateDrawCount', 'updateRemoveButtons', 'showMessage', 'sleep', 'init',
                    'addColor', 'removeColor', 'updateColorRemoveButtons',
                    'highlightAllWinners', 'captureSnapshot', 'sortWinnersByColor', 'resetWinnersOrder'
                ];

                functions.forEach(fn => {
                    this.coverage[fn] = { called: false, branches: {} };
                });
            }

            // 标记函数被调用
            markCalled(funcName) {
                if (this.coverage[funcName]) {
                    this.coverage[funcName].called = true;
                }
            }

            // 注册测试
            test(suite, name, description, fn) {
                this.tests.push({ suite, name, description, fn });
            }

            // 断言方法
            assertEqual(actual, expected, msg = '') {
                if (actual !== expected) {
                    throw new Error(`${msg}\n期望: ${expected}\n实际: ${actual}`);
                }
            }

            assertDeepEqual(actual, expected, msg = '') {
                const actualStr = JSON.stringify(actual);
                const expectedStr = JSON.stringify(expected);
                if (actualStr !== expectedStr) {
                    throw new Error(`${msg}\n期望: ${expectedStr}\n实际: ${actualStr}`);
                }
            }

            assertTrue(condition, msg = '') {
                if (!condition) {
                    throw new Error(`${msg}\n期望: true\n实际: false`);
                }
            }

            assertFalse(condition, msg = '') {
                if (condition) {
                    throw new Error(`${msg}\n期望: false\n实际: true`);
                }
            }

            assertContains(arr, item, msg = '') {
                if (!arr.includes(item)) {
                    throw new Error(`${msg}\n数组不包含: ${item}`);
                }
            }

            assertNotContains(arr, item, msg = '') {
                if (arr.includes(item)) {
                    throw new Error(`${msg}\n数组不应包含: ${item}`);
                }
            }

            assertThrows(fn, msg = '') {
                let threw = false;
                try {
                    fn();
                } catch (e) {
                    threw = true;
                }
                if (!threw) {
                    throw new Error(`${msg}\n期望抛出异常`);
                }
            }

            assertInRange(val, min, max, msg = '') {
                if (val < min || val > max) {
                    throw new Error(`${msg}\n值 ${val} 不在范围 [${min}, ${max}]`);
                }
            }

            // 运行所有测试
            async runAll() {
                this.results = [];

                for (const test of this.tests) {
                    try {
                        await test.fn();
                        this.results.push({
                            suite: test.suite,
                            name: test.name,
                            description: test.description,
                            status: 'pass',
                            error: null
                        });
                    } catch (e) {
                        this.results.push({
                            suite: test.suite,
                            name: test.name,
                            description: test.description,
                            status: 'fail',
                            error: e.message
                        });
                    }
                }

                return this.results;
            }

            // 计算覆盖率
            calculateCoverage() {
                const funcs = Object.keys(this.coverage);
                const covered = funcs.filter(f => this.coverage[f].called);
                const percentage = funcs.length > 0 ? (covered.length / funcs.length * 100) : 0;

                return {
                    total: funcs.length,
                    covered: covered.length,
                    percentage: percentage.toFixed(1),
                    uncovered: funcs.filter(f => !this.coverage[f].called)
                };
            }
        }

        const framework = new TestFramework();

        // 辅助函数 - 获取应用文档
        function getDoc() {
            return framework.appDoc;
        }

        // 辅助函数 - 设置测试环境
        function setupTestEnv() {
            const doc = getDoc();
            
            // 重置状态
            doc.winners = [];
            doc.excludedNumbers = new Set();
            doc.originalWinnersOrder = [];
            doc.sortedPrizes = new Set();
            
            // 设置默认配置
            doc.getElementById('minNumber').value = '1';
            doc.getElementById('maxNumber').value = '100';
            doc.getElementById('excludeNumbers').value = '';
            
            // 设置活动名称默认值
            const activityNameInput = doc.getElementById('activityName');
            if (activityNameInput) {
                activityNameInput.value = 'openJiuwen走进高校-XX';
            }
            
            // 重置奖项配置到默认状态（使用新的命名规则）
            const prizeConfig = doc.getElementById('prizeConfig');
            prizeConfig.innerHTML = `
                <div class="prize-item">
                    <input type="text" class="prize-name" placeholder="最多20个汉字" value="openJiuwen定制-咖啡杯" maxlength="20">
                    <input type="number" class="prize-count" placeholder="名额" value="1" min="0">
                    <input type="number" class="prize-extra" placeholder="补抽" value="0" min="0">
                    <button class="btn-remove-prize" onclick="removePrize(0)">删除</button>
                </div>
                <div class="prize-item">
                    <input type="text" class="prize-name" placeholder="最多20个汉字" value="openJiuwen定制-晴雨伞" maxlength="20">
                    <input type="number" class="prize-count" placeholder="名额" value="2" min="0">
                    <input type="number" class="prize-extra" placeholder="补抽" value="0" min="0">
                    <button class="btn-remove-prize" onclick="removePrize(1)">删除</button>
                </div>
                <div class="prize-item">
                    <input type="text" class="prize-name" placeholder="最多20个汉字" value="openJiuwen定制-防晒衣(邮寄)" maxlength="20">
                    <input type="number" class="prize-count" placeholder="名额" value="3" min="0">
                    <input type="number" class="prize-extra" placeholder="补抽" value="0" min="0">
                    <button class="btn-remove-prize" onclick="removePrize(2)">删除</button>
                </div>
            `;
            
            // 初始化
            doc.updatePrizeSelect();
            doc.updateStats();
        }

        // ==================== 测试用例定义 ====================

        // 1. 奖项管理功能测试
        framework.test('奖项管理功能', '添加奖项 - 正常流程', '测试添加一个新奖项', () => {
            setupTestEnv();
            const doc = getDoc();
            framework.markCalled('addPrize');
            
            const beforeCount = doc.querySelectorAll('#prizeConfig .prize-item').length;
            doc.addPrize();
            const afterCount = doc.querySelectorAll('#prizeConfig .prize-item').length;
            
            framework.assertEqual(afterCount, beforeCount + 1, '奖项数量应增加1');
            
            const lastPrize = doc.querySelectorAll('#prizeConfig .prize-item')[afterCount - 1];
            framework.assertTrue(lastPrize.querySelector('.prize-name').value.includes('openJiuwen定制'), '新奖项应有默认名称openJiuwen定制');
        });

        framework.test('奖项管理功能', '添加多个奖项', '测试连续添加多个奖项', () => {
            setupTestEnv();
            const doc = getDoc();
            
            const beforeCount = doc.querySelectorAll('#prizeConfig .prize-item').length;
            
            for (let i = 0; i < 5; i++) {
                doc.addPrize();
            }
            
            const afterCount = doc.querySelectorAll('#prizeConfig .prize-item').length;
            framework.assertEqual(afterCount, beforeCount + 5, '应添加5个奖项');
        });

        framework.test('奖项管理功能', '删除奖项 - 正常流程', '测试删除存在的奖项', () => {
            setupTestEnv();
            const doc = getDoc();
            framework.markCalled('removePrize');
            
            const beforeCount = doc.querySelectorAll('#prizeConfig .prize-item').length;
            
            if (beforeCount > 1) {
                doc.removePrize(0);
                const afterCount = doc.querySelectorAll('#prizeConfig .prize-item').length;
                framework.assertEqual(afterCount, beforeCount - 1, '奖项数量应减少1');
            }
        });

        framework.test('奖项管理功能', '删除奖项 - 保留最后一个', '测试无法删除最后一个奖项', () => {
            setupTestEnv();
            const doc = getDoc();
            
            // 只保留一个奖项
            while (doc.querySelectorAll('#prizeConfig .prize-item').length > 1) {
                doc.removePrize(0);
            }
            
            const beforeCount = doc.querySelectorAll('#prizeConfig .prize-item').length;
            doc.removePrize(0);
            const afterCount = doc.querySelectorAll('#prizeConfig .prize-item').length;
            
            framework.assertEqual(afterCount, beforeCount, '最后一个奖项不应被删除');
        });

        framework.test('奖项管理功能', '删除奖项 - 有中奖者时确认', '测试删除有中奖者的奖项需要确认', () => {
            setupTestEnv();
            const doc = getDoc();
            
            // 模拟中奖者
            doc.winners = [
                { number: 10, active: false, prizeName: '奖项1', prizeIndex: 0 }
            ];
            
            const originalConfirm = window.confirm;
            let confirmCalled = false;
            window.confirm = () => {
                confirmCalled = true;
                return false; // 用户取消
            };
            
            doc.removePrize(0);
            
            window.confirm = originalConfirm;
            framework.assertTrue(confirmCalled, '应弹出确认对话框');
        });

        framework.test('奖项管理功能', '获取奖项列表', '测试getPrizes返回正确格式', () => {
            setupTestEnv();
            const doc = getDoc();
            framework.markCalled('getPrizes');
            
            const prizes = doc.getPrizes();
            
            framework.assertTrue(Array.isArray(prizes), '应返回数组');
            framework.assertTrue(prizes.length > 0, '应至少有一个奖项');
            
            prizes.forEach((prize, index) => {
                framework.assertTrue(prize.hasOwnProperty('name'), '奖项应有name属性');
                framework.assertTrue(prize.hasOwnProperty('count'), '奖项应有count属性');
                framework.assertTrue(prize.hasOwnProperty('index'), '奖项应有index属性');
            });
        });

        framework.test('奖项管理功能', '获取奖项列表 - 空配置', '测试奖项配置为空时', () => {
            setupTestEnv();
            const doc = getDoc();
            
            const prizeConfig = doc.getElementById('prizeConfig');
            prizeConfig.innerHTML = '';
            
            const prizes = doc.getPrizes();
            framework.assertEqual(prizes.length, 0, '应返回空数组');
        });

        framework.test('奖项管理功能', '更新奖项选择框', '测试updatePrizeSelect更新下拉框', () => {
            setupTestEnv();
            const doc = getDoc();
            framework.markCalled('updatePrizeSelect');
            
            doc.updatePrizeSelect();
            
            const select = doc.getElementById('currentPrize');
            const options = select.querySelectorAll('option');
            const prizes = doc.getPrizes();
            
            framework.assertEqual(options.length, prizes.length, '选项数应与奖项数一致');
        });

        framework.test('奖项管理功能', '奖项名额边界值', '测试奖项名额为0或负数时', () => {
            setupTestEnv();
            const doc = getDoc();
            
            const firstPrize = doc.querySelector('#prizeConfig .prize-item');
            firstPrize.querySelector('.prize-count').value = '0';
            
            const prizes = doc.getPrizes();
            framework.assertEqual(prizes[0].count, 1, '名额为0时应默认为1');
        });

        framework.test('奖项管理功能', '奖项名称为空', '测试奖项名称为空时的默认值', () => {
            setupTestEnv();
            const doc = getDoc();
            
            const firstPrize = doc.querySelector('#prizeConfig .prize-item');
            firstPrize.querySelector('.prize-name').value = '';
            
            const prizes = doc.getPrizes();
            framework.assertTrue(prizes[0].name.includes('奖项'), '名称为空时应使用默认名称');
        });

        // 2. 折叠面板功能测试
        framework.test('折叠面板功能', '展开面板', '测试togglePrizeSettings展开面板', () => {
            setupTestEnv();
            const doc = getDoc();
            framework.markCalled('togglePrizeSettings');
            
            const panel = doc.getElementById('prizeSettingsPanel');
            panel.style.display = 'none';
            
            doc.togglePrizeSettings();
            
            framework.assertEqual(panel.style.display, 'block', '面板应展开');
        });

        framework.test('折叠面板功能', '收起面板', '测试togglePrizeSettings收起面板', () => {
            setupTestEnv();
            const doc = getDoc();
            
            const panel = doc.getElementById('prizeSettingsPanel');
            panel.style.display = 'block';
            
            doc.togglePrizeSettings();
            
            framework.assertEqual(panel.style.display, 'none', '面板应收起');
        });

        framework.test('折叠面板功能', '多次切换', '测试多次切换面板状态', () => {
            setupTestEnv();
            const doc = getDoc();
            
            const panel = doc.getElementById('prizeSettingsPanel');
            panel.style.display = 'none';
            
            doc.togglePrizeSettings();
            framework.assertEqual(panel.style.display, 'block', '第1次应展开');
            
            doc.togglePrizeSettings();
            framework.assertEqual(panel.style.display, 'none', '第2次应收起');
            
            doc.togglePrizeSettings();
            framework.assertEqual(panel.style.display, 'block', '第3次应展开');
        });

        framework.test('折叠面板功能', '图标状态变化', '测试折叠图标的状态切换', () => {
            setupTestEnv();
            const doc = getDoc();
            
            const icon = doc.getElementById('prizeToggleIcon');
            const panel = doc.getElementById('prizeSettingsPanel');
            
            panel.style.display = 'none';
            doc.togglePrizeSettings();
            framework.assertFalse(icon.classList.contains('collapsed'), '展开时图标不应有collapsed类');
            
            doc.togglePrizeSettings();
            framework.assertTrue(icon.classList.contains('collapsed'), '收起时图标应有collapsed类');
        });

        // 3. 号码池计算测试
        framework.test('号码池计算', '获取有效范围 - 默认值', '测试getValidRange默认范围', () => {
            setupTestEnv();
            const doc = getDoc();
            framework.markCalled('getValidRange');
            
            const range = doc.getValidRange();
            
            framework.assertEqual(range.min, 1, '最小值应为1');
            framework.assertEqual(range.max, 100, '最大值应为100');
        });

        framework.test('号码池计算', '获取有效范围 - 自定义范围', '测试getValidRange自定义范围', () => {
            setupTestEnv();
            const doc = getDoc();
            
            doc.getElementById('minNumber').value = '10';
            doc.getElementById('maxNumber').value = '50';
            
            const range = doc.getValidRange();
            
            framework.assertEqual(range.min, 10, '最小值应为10');

        // ==================== 测试运行 ====================
        async function startTesting() {
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            btn.textContent = '测试运行中...';

            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div>正在初始化测试环境...</div>';

            // 等待iframe加载
            const frame = document.getElementById('appFrame');
            await new Promise(resolve => {
                if (frame.contentDocument.readyState === 'complete') {
                    resolve();
                } else {
                    frame.onload = resolve;
                }
            });

            framework.init(frame.contentDocument);

            resultsDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div>正在执行测试用例...</div>';

            // 运行测试
            const results = await framework.runAll();

            // 显示结果
            displayResults(results);

            btn.disabled = false;
            btn.textContent = '重新运行测试';
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '';

            // 按测试套件分组
            const suites = {};
            results.forEach(r => {
                if (!suites[r.suite]) {
                    suites[r.suite] = [];
                }
                suites[r.suite].push(r);
            });

            // 显示统计
            const totalTests = results.length;
            const passedTests = results.filter(r => r.status === 'pass').length;
            const failedTests = results.filter(r => r.status === 'fail').length;
            const passRate = ((passedTests / totalTests) * 100).toFixed(1);

            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('totalTests').textContent = totalTests;
            document.getElementById('passedTests').textContent = passedTests;
            document.getElementById('failedTests').textContent = failedTests;
            document.getElementById('passRate').textContent = passRate + '%';

            // 显示覆盖率
            const coverage = framework.calculateCoverage();
            document.getElementById('coverageSection').style.display = 'block';
            document.getElementById('coverageBar').style.width = coverage.percentage + '%';
            document.getElementById('coverageBar').textContent = coverage.percentage + '%';

            const detailsDiv = document.getElementById('coverageDetails');
            detailsDiv.innerHTML = '';

            Object.keys(framework.coverage).forEach(funcName => {
                const item = document.createElement('div');
                const isCovered = framework.coverage[funcName].called;
                item.className = `coverage-item ${isCovered ? 'covered' : 'uncovered'}`;
                item.innerHTML = `
                    <div class="coverage-func-name">${funcName}()</div>
                    <div class="coverage-func-status">${isCovered ? '✓ 已覆盖' : '✗ 未覆盖'}</div>
                `;
                detailsDiv.appendChild(item);
            });

            // 显示测试结果
            Object.entries(suites).forEach(([suiteName, tests]) => {
                const suiteDiv = document.createElement('div');
                suiteDiv.className = 'test-suite';

                const passed = tests.filter(t => t.status === 'pass').length;
                const headerDiv = document.createElement('div');
                headerDiv.className = 'suite-header';
                headerDiv.innerHTML = `
                    <span class="suite-name">${suiteName}</span>
                    <span class="suite-stats">${passed}/${tests.length} 通过</span>
                `;
                suiteDiv.appendChild(headerDiv);

                tests.forEach(test => {
                    const caseDiv = document.createElement('div');
                    caseDiv.className = 'test-case';

                    caseDiv.innerHTML = `
                        <div class="test-info">
                            <div class="test-name">${test.name}</div>
                            <div class="test-desc">${test.description}</div>
                            ${test.error ? `<div class="test-error">${test.error}</div>` : ''}
                        </div>
                        <div class="test-status status-${test.status}">
                            ${test.status === 'pass' ? '✓ 通过' : '✗ 失败'}
                        </div>
                    `;

                    suiteDiv.appendChild(caseDiv);
                });

                resultsDiv.appendChild(suiteDiv);
            });
        }
