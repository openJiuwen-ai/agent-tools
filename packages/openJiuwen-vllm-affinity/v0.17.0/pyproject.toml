[build-system]
requires = [
    "setuptools>=61.0",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name="jiuwen_vllm_affinity"
license="Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
description = "Repository of plugins to enhance vLLM"
version = "0.1.0"
dependencies = ["vllm>=0.17.0"]

[project.entry-points."vllm.general_plugins"]
jiuwen_vllm_affinity_kv_cache_plugin = "jiuwen_vllm_affinity.kv_cache_plugin.plugin:register"

[tool.setuptools.packages.find]
where = ["."]
