[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openjiuwentools-infer-router"
dynamic = ["version"]
description = "Inference Router package for openjiuwentools - KV Cache aware routing system"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "OpenJiuwen Team", email = "team@openjiuwen.com"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.24.0",
    "loguru>=0.7.0",
    "prometheus-client>=0.17.0",
    "pyyaml>=6.0",
    "transformers>=4.30.0",
    "tokenizers>=0.13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "ruff>=0.1.0",
    "fastapi-testclient>=0.2.0",
]
etcd = [
    "etcd3>=0.12.0",
]

[project.entry-points.'openjiuwentools.components']
openjiuwentools_infer_router = "openjiuwentools.infer_router.api.server:app"

[project.scripts]
jiuwen-infer-router = "openjiuwentools.infer_router.api.server:main"

[project.urls]
Homepage = "https://gitcode.com/openJiuwen/agent-tools"
Repository = "https://gitcode.com/openJiuwen/agent-tools.git"
Issues = "https://gitcode.com/openJiuwen/agent-tools/issues"

[tool.setuptools]
package-dir = {"" = "src"}
packages.find = {where = ["src"]}

[tool.setuptools.dynamic]


[tool.setuptools_scm]
root = "../.."

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
